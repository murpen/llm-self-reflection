# Frontier model experiment configuration
#
# Models are listed in round-robin order. Each model gets an anonymous
# participant number (1, 2, 3, ...) based on its position in this list.

models:
  - model_id: "x-ai/grok-4.1-fast"
    display_name: "Grok 4.1 Fast"
    temperature: 0.7
    max_tokens: 2048
    supports_structured: true
    reasoning: true

  - model_id: "anthropic/claude-opus-4.6"
    display_name: "Claude Opus 4.6"
    temperature: 0.7
    max_tokens: 2048
    supports_structured: true
    reasoning: true

  - model_id: "openai/gpt-5.2"
    display_name: "GPT-5.2"
    temperature: 0.7
    max_tokens: 2048
    supports_structured: true

  - model_id: "google/gemini-3.1-pro-preview"
    display_name: "Gemini 3.1 Pro Preview"
    temperature: 0.7
    max_tokens: 2048
    supports_structured: true
    reasoning: true

prompt_variant: "adversarial"
preamble_version: "A"
max_rounds: 20
run_count: 1
output_dir: "runs"
